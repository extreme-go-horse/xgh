# Example: GitHub CLI provider (generated by /xgh-track)
# This is a reference example — do NOT copy manually. Run /xgh-track instead.

service: github
mode: cli
binary: gh
cursor_strategy: iso8601
repos:
  - owner: ipedro
    repo: xgh
    sources: [issues, pull_requests, discussions, actions, security_alerts, releases]
    watch_prs: [19]
  - owner: mksglu
    repo: context-mode
    sources: [issues, pull_requests, releases, mentions]
    watch_prs: [136, "search:openclaw"]
    watch_issues: ["search:openclaw"]
  - owner: rtk-ai
    repo: rtk
    sources: [releases, issues]
