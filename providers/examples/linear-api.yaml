# Example: Linear API provider (generated by /xgh-track)
# This is a reference example — do NOT copy manually. Run /xgh-track instead.

service: linear
mode: api
base_url: https://api.linear.app
auth:
  type: bearer
  token_env: LINEAR_API_KEY  # reads from ~/.xgh/tokens.env
cursor_strategy: iso8601
endpoints:
  - name: issues
    path: /issues
    method: GET
    params:
      filter: '{"updatedAt": {"gt": "{cursor}"}}'
      first: 50
    pagination:
      type: cursor
      next_field: pageInfo.endCursor
      has_more_field: pageInfo.hasNextPage
    item_mapping:
      source_type: linear_issue
      title: "{item.title}"
      url: "{item.url}"
      author: "{item.creator.name}"
      timestamp: "{item.updatedAt}"
