# xgh BYOP preset: cloud
# ~$0.02/session, requires OPENROUTER_API_KEY
llm:
  provider: openrouter
  model: auto
  api_key: ${OPENROUTER_API_KEY}
embeddings:
  provider: openai
  model: text-embedding-3-small
  api_key: ${OPENAI_API_KEY}
vector_store:
  type: qdrant
  url: ${QDRANT_CLOUD_URL}
  api_key: ${QDRANT_API_KEY}
